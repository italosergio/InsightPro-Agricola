<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightPro Carteira - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80' fill='%231E40AF'>IP</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-badge {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1E40AF 0%, #0891B2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 16px;
            box-shadow: 0 8px 16px rgba(30, 64, 175, 0.3);
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: bold;
            color: #1E40AF;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }
        
        .form-control {
            width: 100%;
            padding: 16px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            color: #00d4ff;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }
        
        .form-control::placeholder {
            color: rgba(0, 212, 255, 0.5);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1E40AF 0%, #0891B2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(30, 64, 175, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            display: none;
        }
        
        .footer {
            text-align: center;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-badge">IP</div>
            <h1>InsightPro Carteira</h1>
            <p>Sistema de Gestão AJINOMOTO</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            Usuário ou senha incorretos
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Usuário</label>
                <input type="text" id="username" class="form-control" placeholder="Digite seu usuário" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        
        <div class="footer">
            <p>Copyright © Narciso Neto</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const a = [110,97,114,99,105,115,111,110,101,116,111];
            const b = [110,97,114,99,105,115,111,111];
            const c = String.fromCharCode(...a);
            const d = String.fromCharCode(...b);
            
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const err = document.getElementById('errorMessage');
                
                if (u === c && p === d) {
                    sessionStorage.setItem('auth', btoa(Date.now().toString()));
                    window.location.href = 'index.html';
                } else {
                    err.style.display = 'block';
                    setTimeout(() => {
                        err.style.display = 'none';
                    }, 3000);
                }
            });
            
            if (sessionStorage.getItem('auth')) {
                window.location.href = 'index.html';
            }
        })();
    </script>
</body>
</html>
